name: Auto-Publish Articles

on:
  schedule:
    # Mo, Mi, Fr um 06:00 UTC (08:00 MESZ)
    - cron: "0 6 * * 1,3,5"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of articles to generate"
        required: false
        default: "1"
      dry_run:
        description: "Dry run (no publish)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Content Pipeline
        env:
          # Required: Set ANTHROPIC_API_KEY in GitHub Secrets for CI/CD
          # Locally, the pipeline uses `claude` CLI (Max Abo) if no key is set
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          COUNT="${{ github.event.inputs.count || '1' }}"
          npx tsx pipeline/run.ts --count $COUNT $ARGS

      - name: Configure Git
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "AI Content Pipeline"
          git config user.email "pipeline@ki-tools-vergleich.de"

      - name: Push changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "auto: publish new articles [skip ci]" && git push
